services:
  # Backend API - Python FastAPI application
  - type: web
    name: dealflow-api
    runtime: python312
    buildCommand: cd be && pip install -r requirements.txt
    startCommand: "cd be && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
    autoDeploy: true
    
  # Frontend - React/Vite static site
  - type: static_site
    name: dealflow-frontend
    buildCommand: cd fe && npm install && npm run build
    staticPublishPath: fe/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: dealflow-api
          type: web
          property: url
    autoDeploy: true
    routes:
      - path: /
        destination: /index.html
        status: 200
      - path: /api/*
        destination: ${DEALFLOW_API_URL}/api/$1
